<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Beans Cafe</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div style="background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: var(--primary-brown);">Beans Cafe</h2>
        <p>Admin Panel Login</p>
    </div>
    
    <form id="admin-login-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="admin-email" required placeholder="admin@beanscafe.com">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="admin-password" required placeholder="••••••">
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">Login</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="../index.html" style="color: var(--primary-brown);">← Back to Website</a>
    </div>
</div>

<script src="script/admin-login.js"></script>

</body>
</html>
