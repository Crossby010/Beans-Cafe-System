<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Beans Cafe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-decoration">
        <div class="coffee-bean">☕</div>
        <div class="coffee-bean">🫘</div>
        <div class="coffee-bean">☕</div>
        <div class="coffee-bean">🫘</div>
        <div class="coffee-bean">☕</div>
        <div class="coffee-bean">🫘</div>
        <div class="coffee-bean">☕</div>
        <div class="coffee-bean">🫘</div>
    </div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-mug-hot"></i>
            </div>
            <h1>Beans <span>Cafe</span></h1>
            <p>Admin Panel Login</p>
        </div>

        <form id="admin-login-form" class="login-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="admin-email" placeholder="admin@beanscafe.com" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="admin-password" placeholder="Enter your password" required autocomplete="current-password">
                    <i class="fas fa-eye-slash password-toggle" id="passwordToggle"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="back-link">
            <a href="../index.html">
                <i class="fas fa-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>

    <script src="script/admin-login.js"></script>
    
    <script>
        // Password visibility toggle
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('admin-password');
        
        if (passwordToggle && passwordInput) {
            passwordToggle.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>
</html>
